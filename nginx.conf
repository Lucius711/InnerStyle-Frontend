# InnerStyle frontend: serves the SPA and reverse-proxies the API to the backend container.
upstream backend {
    server backend:2207;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (multi-image / image-to-3D). Keep >= Spring's multipart limit.
    client_max_body_size 80m;

    # Real client IP forwarded to the backend (needed by the rate limiter).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SEO files.
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }

    # Backend API + docs + health (server-to-server gateway IPNs hit /api/common/payments/*).
    location /api/        { proxy_pass http://backend; }
    location /actuator/   { proxy_pass http://backend; }
    location /swagger-ui  { proxy_pass http://backend; }
    location /swagger-ui/ { proxy_pass http://backend; }
    location /v3/api-docs { proxy_pass http://backend; }

    # SPA fallback for client-side routes (/login, /wallet, /studio, ...).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
